- name: system-tests-external-dbs-rds
  serial: true
  plan:
  - in_parallel:
    - get: backup-and-restore-sdk-release-ci
    - get: backup-and-restore-sdk-release
      passed: [build-rc]
    - get: dev-release
      trigger: true
      passed: [build-rc]
    - get: bosh-deployment
    - get: bosh-bootloader
    - get: jammy-stemcell
    - get: bosh-integration-image

  - task: bbl-up
    file: backup-and-restore-sdk-release-ci/ci/tasks/bbl-up/task.yml
    params:
      <<: *bbl-gcp-params
      PIPELINE_JOB: system-tests-external-dbs-rds

  - task: extract-bbl-env
    file: backup-and-restore-sdk-release-ci/ci/tasks/extract-bbl-env/task.yml

  - load_var: bbl-env
    file: bosh-env/metadata.yml
    format: yml

  - task: generate-source-file
    file: backup-and-restore-sdk-release-ci/ci/tasks/bosh-deployment-resource-source-file-adapter/task.yml
    params: *bbl-bosh-creds

  - put: database-backup-restorer-deployment
    params:
      manifest: backup-and-restore-sdk-release-ci/ci/manifests/database-backup-restorer.yml
      stemcells: [jammy-stemcell/*.tgz]
      releases: [dev-release/*.tgz]
      vars:
        deployment-name: database-backup-restorer
        availability_zone: z1
      source_file: source-file/source-file.yml

  - put: terraform
    params:
      terraform_source: backup-and-restore-sdk-release-ci/ci/terraform/bbr-sdk-system-tests/aws/
      env_name: bbr-sdk-external-rds-dbs
      delete_on_failure: true
      vars:
        aws_region: *aws-region
        <<: [*external_db_passwords, *aws_credentials_tf]
    get_params:
      output_statefile: true

  - load_var: tf-outputs
    file: terraform/metadata
    format: json

  - task: download-rds-ca-bundle
    config:
      platform: linux
      image_resource:
        type: registry-image
        source: {repository: curlimages/curl}
      outputs: [{name: cert-store}]
      run:
        path: curl
        args:
          - -fsSLo
          - cert-store/rds-combined-ca-bundle.pem
          - https://truststore.pki.rds.amazonaws.com/eu-west-1/eu-west-1-bundle.pem

  - load_var: rds-ca-cert
    file: cert-store/rds-combined-ca-bundle.pem

  - task: verify-rds-connectivity
    image: bosh-integration-image
    file: backup-and-restore-sdk-release-ci/ci/tasks/verify-rds-connectivity/task.yml
    params:
      BOSH_GW_HOST: ((.:bbl-env.INSTANCE_JUMPBOX_EXTERNAL_IP))
      BOSH_GW_USER: ((.:bbl-env.INSTANCE_JUMPBOX_USER))
      BOSH_GW_PRIVATE_KEY: ((.:bbl-env.INSTANCE_JUMPBOX_PRIVATE))
      POSTGRES_13_HOST: ((.:tf-outputs.postgres_13_address))
      POSTGRES_15_HOST: ((.:tf-outputs.postgres_15_address))
      POSTGRES_16_HOST: ((.:tf-outputs.postgres_16_address))
      MARIADB_10_6_HOST: ((.:tf-outputs.mariadb_10_6_address))

  - in_parallel:
    - task: postgres-tls-system-tests-15
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-system-db/task.yml
      params:
        <<: *bbl-bosh-creds
        POSTGRES_HOSTNAME: ((.:tf-outputs.postgres_15_address))
        POSTGRES_PASSWORD: *postgres_15_password
        POSTGRES_CA_CERT: ((.:rds-ca-cert))
        TEST_SSL_USER_REQUIRES_SSL: false
        TEST_SUITE_NAME: postgresql_tls
    - do:
      - task: postgres-system-tests-16
        image: bosh-integration-image
        file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-system-db/task.yml
        params:
          <<: *bbl-bosh-creds
          POSTGRES_HOSTNAME: ((.:tf-outputs.postgres_16_address))
          POSTGRES_PASSWORD: *postgres_16_password
          TEST_SUITE_NAME: postgresql
      - task: postgres-tls-system-tests-16
        image: bosh-integration-image
        file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-system-db/task.yml
        params:
          <<: *bbl-bosh-creds
          POSTGRES_HOSTNAME: ((.:tf-outputs.postgres_16_address))
          POSTGRES_PASSWORD: *postgres_16_password
          POSTGRES_CA_CERT: ((.:rds-ca-cert))
          TEST_SSL_USER_REQUIRES_SSL: false
          TEST_SUITE_NAME: postgresql_tls
    - do:
      - task: postgres-system-tests-13
        image: bosh-integration-image
        file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-system-db/task.yml
        params:
          <<: *bbl-bosh-creds
          POSTGRES_HOSTNAME: ((.:tf-outputs.postgres_13_address))
          POSTGRES_PASSWORD: *postgres_13_password
          TEST_SUITE_NAME: postgresql
      - task: postgres-tls-system-tests-13
        image: bosh-integration-image
        file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-system-db/task.yml
        params:
          <<: *bbl-bosh-creds
          POSTGRES_HOSTNAME: ((.:tf-outputs.postgres_13_address))
          POSTGRES_PASSWORD: *postgres_13_password
          POSTGRES_CA_CERT: ((.:rds-ca-cert))
