        image: bosh-integration-image
        file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-system-db/task.yml
        params:
          <<: *bbl-bosh-creds
          MYSQL_HOSTNAME: ((.:tf-outputs.mariadb_10_6_address))
          MYSQL_PASSWORD: *mariadb_10_password
