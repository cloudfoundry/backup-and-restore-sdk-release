    params:
      <<: *AWS_ACCESS
      GIT_USERNAME: *github_user
      GIT_EMAIL: *github_email
      GIT_BRANCH: main
      BLOB_NAME: ncurses
      BLOB_EXTENSION: .tar.gz
      BLOB_DIRECTORY: ncurses/
      UPDATE_REFERENCES: only-variable-name:NCURSES_VERSION
  # Postgres 13
  - task: bump-postgres-13-blob
    image: bosh-integration-image
