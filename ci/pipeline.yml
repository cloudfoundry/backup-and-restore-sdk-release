---
#! ************************************
#! Secrets we need to run this pipeline
#! ************************************
secrets:
- &backup_and_restore_sdk_branch main

- &aws-region eu-west-1
- &aws-backup-region eu-central-1
- &number_of_test_retries 3

- &aws-access
#! AWS access keys for the 686843836666 account
  aws-access-key-id: &aws_access_key ((bbr_aws_access_key.username))
  aws-secret-access-key: &aws_secret_key ((bbr_aws_access_key.password))
  aws-assumed-role-arn: &aws_role_arn ((bbr_aws_access_key.role_arn))

- &S3_AWS
  S3_ACCESS_KEY_ID: *aws_access_key
  S3_SECRET_ACCESS_KEY: *aws_secret_key
  S3_ASSUMED_ROLE_ARN: *aws_role_arn
- &AWS_ACCESS
  AWS_ACCESS_KEY_ID: *aws_access_key
  AWS_SECRET_ACCESS_KEY: *aws_secret_key
  AWS_ROLE_ARN: *aws_role_arn
  AWS_ASSUME_ROLE_ARN: *aws_role_arn
  AWS_ASSUMED_ROLE_ARN: *aws_role_arn
- &aws_credentials_s3
  access_key_id: *aws_access_key
  secret_access_key: *aws_secret_key
  aws_role_arn: *aws_role_arn
  assume_role_arn: *aws_role_arn
- &aws_credentials_tf
  aws_access_key: *aws_access_key
  aws_secret_key: *aws_secret_key
  aws_assumed_role_arn: *aws_role_arn

- release_private_yaml: &release_private_yaml |
    ---
    blobstore:
      provider: s3
      options:
        access_key_id: ((bbr_aws_access_key.username))
        secret_access_key: ((bbr_aws_access_key.password))
        assume_role_arn: ((bbr_aws_access_key.role_arn))

#! Azure credentials for 3 separate storage accounts (CF-bosh-toronto-king subscription)
- &azure_credentials_storage_account_1 ((bbr_azure_credentials.storage_account))
- &azure_credentials_storage_key_1 ((bbr_azure_credentials.storage_account_key))
- &azure_credentials_storage_account_2 ((bbr_azure_credentials.storage_account2))
- &azure_credentials_storage_key_2 ((bbr_azure_credentials.storage_account2_key))
- &azure_storage_account_no_soft_delete ((bbr_azure_credentials.storage_account_no_soft_delete))
- &azure_storage_key_no_soft_delete ((bbr_azure_credentials.storage_account_no_soft_delete_key))

#! CF-org GCP credentials for GCS bucket access and contract tests
- &gcp_service_account_key ((gcp_service_account_key))
- &gcp_project_name ((gcp_project_name))

#! github_access_token is required to create PRs against repos used in this pipeline
- &git_token ((github_read_write_token))

#! github_email and user used for creating commits
- &github_email bots@cloudfoundry.org
- &github_user CI Bot

#! External RDS DB passwords (used by system-tests-external-dbs-rds)
- &external_db_passwords
  postgres_13_password: &postgres_13_password ((rds_postgres_13_password))
  postgres_15_password: &postgres_15_password ((rds_postgres_15_password))
  postgres_16_password: &postgres_16_password ((rds_postgres_16_password))
  mariadb_10_password: &mariadb_10_password ((rds_mariadb_10_password))

- &mysql_common
  MYSQL_PORT: 3306
  MYSQL_USERNAME: root
  MYSQL_PASSWORD: &mysql-password mysql_password

- &mysql-8-0-deployment-name mysql-8-0-dev
- &mysql-8-0-host 10.244.0.10

- &mysql_params_8
  MYSQL_HOSTNAME: *mysql-8-0-host
  <<: *mysql_common

- &mysql-8-4-deployment-name mysql-8-4-dev
- &mysql-8-4-host 10.244.0.11

- &mysql_params_8_4
  MYSQL_HOSTNAME: *mysql-8-4-host
  <<: *mysql_common

- &minio_access_key ((minio_user.username))
- &minio_secret_key ((minio_user.password))

- &pg_deployment_common
  db_username: test_user
  db_password: postgres_password

- &postgres-15-deployment-name postgres-15-dev
- &postgres-16-deployment-name postgres-16-dev
- &postgres-17-deployment-name postgres-17-dev
- &postgres-15-host 10.244.0.15
- &postgres-16-host 10.244.0.16
- &postgres-17-host 10.244.0.17

#! bbl GCP params for all GCP-based bbl environments
- &bbl-gcp-params
  BBL_IAAS: gcp
  BBL_GCP_SERVICE_ACCOUNT_KEY: ((gcp_json_key))
  BBL_GCP_REGION: europe-west1

#! bbl AWS params for IAM instance profile tests
- &bbl-aws-params
  BBL_IAAS: aws
  BBL_AWS_ACCESS_KEY_ID: *aws_access_key
  BBL_AWS_SECRET_ACCESS_KEY: *aws_secret_key
  BBL_AWS_REGION: eu-west-1
  BBL_AWS_IAM_INSTANCE_PROFILE: ((bbl_aws_iam_instance_profile))

#! BOSH credentials sourced from the bbl environment (loaded via load_var: bbl-env)
- &bbl-bosh-creds
  BOSH_ENVIRONMENT: ((.:bbl-env.BOSH_ENVIRONMENT))
  BOSH_CLIENT: ((.:bbl-env.BOSH_CLIENT))
  BOSH_CLIENT_SECRET: ((.:bbl-env.BOSH_CLIENT_SECRET))
  BOSH_CA_CERT: ((.:bbl-env.BOSH_CA_CERT))
  BOSH_GW_USER: ((.:bbl-env.INSTANCE_JUMPBOX_USER))
  BOSH_GW_HOST: ((.:bbl-env.INSTANCE_JUMPBOX_EXTERNAL_IP))
  BOSH_GW_PRIVATE_KEY: ((.:bbl-env.INSTANCE_JUMPBOX_PRIVATE))

- &docker_username ((docker.username))
- &docker_password ((docker.password))

resource_types:
- name: http
  type: registry-image
  source:
    repository: aequitas/http-resource
    username: *docker_username
    password: *docker_password

- name: bosh-deployment-resource
  type: registry-image
  source:
    repository: cloudfoundry/bosh-deployment-resource
    username: *docker_username
    password: *docker_password

- name: custom-terraform
  type: registry-image
  source:
    repository: ljfranklin/terraform-resource
    tag: 0.14.2
    username: *docker_username
    password: *docker_password

resources:
- name: bosh-ecosystem-docker-image
  type: registry-image
  source:
    repository: bosh/bosh-ecosystem-concourse
    username: ((docker.username))
    password: ((docker.password))
- name: ruby-image
  type: registry-image
  source:
    repository: ruby
    username: ((docker.username))
    password: ((docker.password))
- name: bosh-security-scanner-registry-image
  type: registry-image
  source:
    repository: bosh/security-scanner
    username: ((docker.username))
    password: ((docker.password))
- name: bosh-cli-registry-image
  type: registry-image
  source:
    repository: bosh/cli
    username: ((docker.username))
    password: ((docker.password))

#! bbl infrastructure resources
- name: bosh-deployment
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-deployment.git

- name: bosh-bootloader
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-bootloader.git
    tag_filter: v*

#! Blob resources
- name: mariadb-10-6-blob
  type: http
  source:
    index: https://archive.mariadb.org/
    uri: "https://archive.mariadb.org/mariadb-{version}/source/mariadb-{version}.tar.gz"
    regex: href="mariadb-(?P<version>10.6.[0-9]*)/"

- name: mysql-server-8-blob
  type: http
  source:
    index: https://dev.mysql.com/downloads/mysql/8.0.html?tpl=platform&os=2&version=8.0&osva=
    uri: "https://dev.mysql.com/get/Downloads/MySQL-8.0/mysql-{version}-linux-glibc2.17-x86_64-minimal.tar.xz"
    regex: "mysql-(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)-linux-glibc.*-x86_64-minimal\\.tar\\.xz"

- name: mysql-server-8-4-blob
  type: http
  source:
    index: https://dev.mysql.com/downloads/mysql/8.4.html?tpl=platform&os=2&version=8.4&osva=
    uri: "https://dev.mysql.com/get/Downloads/MySQL-8.4/mysql-{version}-linux-glibc2.28-x86_64-minimal.tar.xz"
    regex: "mysql-(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)-linux-glibc.*-x86_64-minimal\\.tar\\.xz"

- name: ncurses-blob
  type: http
  source:
    index: https://mirrors.kernel.org/gnu/ncurses/
    uri: https://mirrors.kernel.org/gnu/ncurses/ncurses-{version}.tar.gz
    regex: href="ncurses-(?P<version>[0-9]*.[0-9]*).tar.gz"

- name: postgres-13-blob
  type: http
  source:
    index: https://ftp.postgresql.org/pub/source/
    uri: https://ftp.postgresql.org/pub/source/v{version}/postgresql-{version}.tar.gz
    regex: href="v(?P<version>13.[0-9]*.[0-9]*)/"
- name: postgres-15-blob
  type: http
  source:
    index: https://ftp.postgresql.org/pub/source/
    uri: https://ftp.postgresql.org/pub/source/v{version}/postgresql-{version}.tar.gz
    regex: href="v(?P<version>15.[0-9]*.[0-9]*)/"
- name: postgres-16-blob
  type: http
  source:
    index: https://ftp.postgresql.org/pub/source/
    uri: https://ftp.postgresql.org/pub/source/v{version}/postgresql-{version}.tar.gz
    regex: href="v(?P<version>16.[0-9]*.[0-9]*)/"
- name: postgres-17-blob
  type: http
  source:
    index: https://ftp.postgresql.org/pub/source/
    uri: https://ftp.postgresql.org/pub/source/v{version}/postgresql-{version}.tar.gz
    regex: href="v(?P<version>17.[0-9]*.[0-9]*)/"

- name: libpcre2-blob
  type: github-release
  source:
    owner: PCRE2Project
    repository: pcre2
    access_token: *git_token
    tag_filter: pcre2-([0-9]*.[0-9]*)
    order_by: time

- name: bosh-integration-image
  type: registry-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/integration
    tag: main
    username: ((github_read_write_packages.username))
    password: ((github_read_write_packages.password))

- name: pxc-release
  type: bosh-io-release
  source:
    repository: cloudfoundry/pxc-release

- name: bpm-release
  type: bosh-io-release
  source:
    repository: cloudfoundry/bpm-release

#! BOSH deployment resources for system-tests-dbs
- name: mysql-8-0-deployment
  type: bosh-deployment-resource
  source:
    deployment: *mysql-8-0-deployment-name
    skip_check: true

- name: mysql-8-4-deployment
  type: bosh-deployment-resource
  source:
    deployment: *mysql-8-4-deployment-name
    skip_check: true

- name: postgres-15-dev-deployment
  type: bosh-deployment-resource
  source:
    deployment: *postgres-15-deployment-name
    skip_check: true

- name: postgres-16-dev-deployment
  type: bosh-deployment-resource
  source:
    deployment: *postgres-16-deployment-name
    skip_check: true

- name: postgres-17-dev-deployment
  type: bosh-deployment-resource
  source:
    deployment: *postgres-17-deployment-name
    skip_check: true

- name: database-backup-restorer-deployment
  type: bosh-deployment-resource
  source:
    deployment: database-backup-restorer
    skip_check: true

#! BOSH deployment resources for system-tests-blobstore
- name: aws-blobstore-sdk-deployment
  type: bosh-deployment-resource
  source:
    deployment: s3-backuper
    skip_check: true

- name: azure-blobstore-sdk-deployment
  type: bosh-deployment-resource
  source:
    deployment: azure-backuper
    skip_check: true

- name: gcs-blobstore-sdk-deployment
  type: bosh-deployment-resource
  source:
    deployment: gcs-backuper
    skip_check: true

#! BOSH deployment resource for system-tests-s3-iam-instance-profile
- name: s3-backuper-iam-deployment
  type: bosh-deployment-resource
  source:
    deployment: s3-backuper
    skip_check: true

#! Terraform for RDS provisioning (system-tests-external-dbs-rds)
- name: terraform
  type: custom-terraform
  icon: terraform
  source:
    backend_type: s3
    backend_config:
      bucket: backup-and-restore-sdk-releases
      key: terraform-rds-state
      region: eu-west-1
      access_key: ((bbr_aws_access_key.username))
      secret_key: ((bbr_aws_access_key.password))

- name: jammy-stemcell
  type: bosh-io-stemcell
  icon: seed-outline
  source:
    name: bosh-warden-boshlite-ubuntu-jammy-go_agent
    version_family: latest

- name: jammy-stemcell-aws
  type: bosh-io-stemcell
  source:
    name: bosh-aws-xen-hvm-ubuntu-jammy-go_agent

- name: version
  type: semver
  icon: tag
  source:
    bucket: backup-and-restore-sdk-releases
    region_name: *aws-region
    key: current-dev-version
    <<: *aws_credentials_s3

- name: dev-release
  type: s3
  icon: database
  source:
    bucket: backup-and-restore-sdk-releases
    versioned_file: dev-release.tgz
    region_name: *aws-region
    <<: *aws_credentials_s3

- name: release-notes
  type: s3
  source:
    bucket: backup-and-restore-sdk-release-blobs
    versioned_file: release-notes.md
    region_name: *aws-region
    <<: *aws_credentials_s3

- name: backup-and-restore-sdk-release-write-only
  type: git
  icon: github
  source:
    uri: https://github.com/cloudfoundry/backup-and-restore-sdk-release.git
    branch: *backup_and_restore_sdk_branch
    username: bosh-admin-bot
    password: *git_token
    disable_ci_skip: true
    commit_filter:
      exclude:
      - ;resource comment; This resource is used exclusively for pushing new changes

- name: backup-and-restore-sdk-release
  type: git
  icon: github
  source:
    uri: https://github.com/cloudfoundry/backup-and-restore-sdk-release.git
    branch: *backup_and_restore_sdk_branch
    username: bosh-admin-bot
    password: *git_token
    ignore_paths: [ "ci" ]

- name: backup-and-restore-sdk-release-ci
  type: git
  icon: github
  source:
    uri: https://github.com/cloudfoundry/backup-and-restore-sdk-release.git
    branch: *backup_and_restore_sdk_branch
    username: bosh-admin-bot
    password: *git_token
    paths: [ "ci" ]

- name: bosh-shared-ci
  type: git
  source:
    uri: https://github.com/cloudfoundry/bosh-shared-ci.git

- name: every-week
  type: time
  source:
    interval: 168h # 24h*7days

- name: github-release
  type: github-release
  icon: rocket
  source:
    user: cloudfoundry
    repository: backup-and-restore-sdk-release
    access_token: *git_token

- name: golang-release
  type: git
  icon: tag
  source:
    uri: https://github.com/cloudfoundry/bosh-package-golang-release.git
    tag_filter: v*
- name: golang-release-image
  type: registry-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/golang-release

- name: ruby-install
  type: github-release
  source:
    access_token: *git_token
    owner: postmodern
    repository: ruby-install
    tag_filter: \d+\.\d+\.\d+

jobs:
- name: unit-tests
  serial: true
  plan:
  - in_parallel:
    - get: backup-and-restore-sdk-release-ci
    - get: backup-and-restore-sdk-release
      trigger: true
    - get: bosh-integration-image
    - get: bosh-ecosystem-docker-image
    - get: ruby-install
  - in_parallel:
    - task: sdk-template-unit-tests
      image: bosh-ecosystem-docker-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-template-unit-tests/task.yml
    - task: databases-unit-tests
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/database-unit-tests/task.yml
      privileged: true
    - task: s3-blobstore-unit-tests
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-unit-blobstore/task.yml
      params:
        PACKAGE_NAME: s3-blobstore-backup-restore
        GINKGO_EXTRA_FLAGS: -p --skip-package s3bucket
    - task: azure-blobstore-unit-tests
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-unit-blobstore/task.yml
      params:
        PACKAGE_NAME: azure-blobstore-backup-restore
        GINKGO_EXTRA_FLAGS: -p --skip-package contract_test
    - task: gcs-blobstore-unit-tests
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-unit-blobstore/task.yml
      params:
        PACKAGE_NAME: gcs-blobstore-backup-restore
        GINKGO_EXTRA_FLAGS: -p --skip-package contract_test

- name: contract-tests
  serial: true
  plan:
  - in_parallel:
    - get: backup-and-restore-sdk-release-ci
    - get: backup-and-restore-sdk-release
      trigger: true
      passed:
      - unit-tests
    - get: bosh-integration-image
  - in_parallel:
    - task: aws-s3-blobstore-contract-tests
      image: bosh-integration-image
      attempts: *number_of_test_retries
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-unit-blobstore/task.yml
      params:
        PACKAGE_NAME: s3-blobstore-backup-restore/s3bucket
        S3_LIVE_REGION: *aws-region
        S3_BACKUP_REGION: *aws-backup-region
        S3_ENDPOINT: ""
        S3_BIG_FILE_BUCKET: "large-blob-test-bucket-unversioned"
        <<: *S3_AWS
    - task: gcs-blobstore-contract-tests
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-unit-blobstore/task.yml
      params:
        PACKAGE_NAME: gcs-blobstore-backup-restore/contract_test
        GCP_SERVICE_ACCOUNT_KEY: *gcp_service_account_key
        GCP_PROJECT_NAME: *gcp_project_name
    - task: azure-blobstore-contract-tests
      image: bosh-integration-image
      file: backup-and-restore-sdk-release-ci/ci/tasks/sdk-unit-blobstore/task.yml
      params:
        PACKAGE_NAME: azure-blobstore-backup-restore/contract_test
        AZURE_STORAGE_ACCOUNT: *azure_credentials_storage_account_1
        AZURE_STORAGE_KEY: *azure_credentials_storage_key_1
        AZURE_STORAGE_ACCOUNT_NO_SOFT_DELETE: *azure_storage_account_no_soft_delete
        AZURE_STORAGE_KEY_NO_SOFT_DELETE: *azure_storage_key_no_soft_delete
        AZURE_DIFFERENT_STORAGE_ACCOUNT: *azure_credentials_storage_account_2
        AZURE_DIFFERENT_STORAGE_KEY: *azure_credentials_storage_key_2
        AZURE_CONTAINER_NAME_MANY_FILES: bbr-test-many-blobs-azure-container

- name: build-rc
  serial: true
  serial_groups: [version]
  plan:
  - in_parallel:
    - get: backup-and-restore-sdk-release
      passed: [contract-tests]
      trigger: true
    - get: bosh-shared-ci
    - get: bosh-cli-registry-image
  - task: create-dev-release
    image: bosh-cli-registry-image
    file: bosh-shared-ci/tasks/release/create-dev-release.yml
    input_mapping:
      release_repo: backup-and-restore-sdk-release
  - put: dev-release
    params:
      file: release_tarball/release.tgz

- name: system-tests-dbs
  serial: true
  plan:
  - in_parallel:
    - get: backup-and-restore-sdk-release-ci
    - get: backup-and-restore-sdk-release
      passed: [build-rc]
    - get: dev-release
      trigger: true
      passed: [build-rc]
    - get: bosh-deployment
    - get: bosh-bootloader
    - get: jammy-stemcell
    - get: bpm-release
    - get: pxc-release
    - get: bosh-integration-image

  - task: bbl-up
    file: backup-and-restore-sdk-release-ci/ci/tasks/bbl-up/task.yml
    params:
      <<: *bbl-gcp-params
      PIPELINE_JOB: system-tests-dbs

  - task: extract-bbl-env
    file: backup-and-restore-sdk-release-ci/ci/tasks/extract-bbl-env/task.yml

  - load_var: bbl-env
    file: bosh-env/metadata.yml
    format: yml

  - task: generate-source-file
    file: backup-and-restore-sdk-release-ci/ci/tasks/bosh-deployment-resource-source-file-adapter/task.yml
    params: *bbl-bosh-creds

  #! Deploy postgres + database-backup-restorer in parallel (different packages)
  - in_parallel:
    - put: postgres-15-dev-deployment
      params:
        manifest: backup-and-restore-sdk-release-ci/ci/manifests/postgres.yml
        stemcells: [jammy-stemcell/*.tgz]
        vars:
          deployment-name: *postgres-15-deployment-name
          db_host: *postgres-15-host
          postgres_version: 15
          <<: *pg_deployment_common
          availability_zone: z1
        source_file: source-file/source-file.yml
        releases: [bpm-release/*.tgz]
    - put: postgres-16-dev-deployment
      params:
        manifest: backup-and-restore-sdk-release-ci/ci/manifests/postgres.yml
        stemcells: [jammy-stemcell/*.tgz]
        vars:
          deployment-name: *postgres-16-deployment-name
          db_host: *postgres-16-host
          postgres_version: 16
          <<: *pg_deployment_common
          availability_zone: z1
        source_file: source-file/source-file.yml
        releases: [bpm-release/*.tgz]
    - put: postgres-17-dev-deployment
      params:
        manifest: backup-and-restore-sdk-release-ci/ci/manifests/postgres.yml
        stemcells: [jammy-stemcell/*.tgz]
        vars:
          deployment-name: *postgres-17-deployment-name
          db_host: *postgres-17-host
          postgres_version: 17
          <<: *pg_deployment_common
          availability_zone: z1
        source_file: source-file/source-file.yml
        releases: [bpm-release/*.tgz]
    - put: database-backup-restorer-deployment
      params:
        manifest: backup-and-restore-sdk-release-ci/ci/manifests/database-backup-restorer.yml
        stemcells: [jammy-stemcell/*.tgz]
        releases: [dev-release/*.tgz]
        vars:
          deployment-name: database-backup-restorer
          availability_zone: z1
        source_file: source-file/source-file.yml

  #! MySQL deployments must be serial — PXC package compilation cannot be parallelised
  - put: mysql-8-0-deployment
    timeout: 3h
    params:
      manifest: backup-and-restore-sdk-release-ci/ci/manifests/mysql.yml
      stemcells: [jammy-stemcell/*.tgz]
      vars:
        mysql_version: "8.0"
        deployment-name: *mysql-8-0-deployment-name
        db_password: *mysql-password
        db_host: *mysql-8-0-host
        availability_zone: z1
      source_file: source-file/source-file.yml
      releases: [bpm-release/*.tgz, pxc-release/*.tgz]

  - put: mysql-8-4-deployment
    timeout: 3h
    params:
      manifest: backup-and-restore-sdk-release-ci/ci/manifests/mysql.yml
      stemcells: [jammy-stemcell/*.tgz]
      vars:
        mysql_version: "8.4"
        deployment-name: *mysql-8-4-deployment-name
        db_password: *mysql-password
        db_host: *mysql-8-4-host
        availability_zone: z1
      source_file: source-file/source-file.yml
      releases: [bpm-release/*.tgz, pxc-release/*.tgz]

  - in_parallel:
    - task: postgres-15-system-tests
      image: bosh-integration-image
